<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="alternate icon" href="/static/favicon.png" sizes="32x32" />
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-md">
      <h1 class="text-3xl font-bold mb-6 text-gray-800 text-center">
        Select a Database
      </h1>

      {{ if .ErrorMsg }}
      <div class="mb-4 p-3 bg-red-100 text-red-800 rounded">
        {{ .ErrorMsg }}
      </div>
      {{ end }}

      <!-- New DB form -->
      <form method="POST" action="/createdb" class="mb-6 space-y-2">
        <label for="newdb" class="block font-medium text-gray-700"
          >Create a new database</label
        >
        <div class="flex space-x-2">
          <input
            id="newdb"
            name="newdb"
            required
            placeholder="New database name"
            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
          <button
            type="submit"
            class="px-5 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-all"
          >
            Create
          </button>
        </div>
      </form>

      <form method="POST" action="/select" class="space-y-6">
        <div>
          <label for="db" class="block font-medium text-gray-700 mb-1">
            Or select an existing databases
          </label>
          <select
            id="db"
            name="db"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          >
            {{range .Databases}}
            <option value="{{.}}">{{.}}</option>
            {{end}}
          </select>
        </div>

        <div class="flex justify-between items-center">
          <a
            href="/reset"
            class="inline-block py-2 px-5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-all"
            >Reset</a
          >
          <button
            type="submit"
            class="inline-block py-2 px-5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-all"
          >
            Query
          </button>
        </div>
      </form>
    </div>
  </body>
</html>

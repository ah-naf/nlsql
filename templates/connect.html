<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect to SQL Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-xl shadow-xl w-full max-w-lg">
      <h1 class="text-3xl font-bold mb-6 text-gray-800 text-center">
        Connect to Database
      </h1>

      {{if .ErrorMsg}}
      <div
        id="error-alert"
        class="mb-6 p-4 bg-red-100 border border-red-300 text-red-700 rounded relative shadow-sm"
      >
        <span>{{.ErrorMsg}}</span>
        <button
          onclick="document.getElementById('error-alert').style.display='none'"
          class="absolute top-2 right-3 text-red-500 hover:text-red-700 text-lg"
          title="Close"
        >
          &times;
        </button>
      </div>
      {{end}}

      <form method="POST" action="/connect" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            >Host</label
          >
          <input
            type="text"
            name="host"
            placeholder="e.g. localhost"
            value="{{.Host}}"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            >Port</label
          >
          <input
            type="text"
            name="port"
            placeholder="e.g. 5432"
            value="{{.Port}}"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            >Username</label
          >
          <input
            type="text"
            name="user"
            placeholder="e.g. postgres"
            value="{{.User}}"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            >Password</label
          >
          <input
            type="password"
            name="pass"
            placeholder="Your DB password"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1"
            >Default DB Name</label
          >
          <input
            type="text"
            name="dbname"
            placeholder="e.g. postgres"
            value="{{.DBName}}"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <div class="flex justify-between items-center mt-6">
          <button
            type="submit"
            class="py-2 px-6 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition-all"
          >
            Connect
          </button>
          <a
            href="/reset"
            class="py-2 px-6 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-all"
            >Reset</a
          >
        </div>
      </form>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NL → SQL Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css"
    />
    <link rel="stylesheet" href="/static/css/query.css" />
    <style>
      #main-content.with-sidebar {
        width: calc(100% - 25rem);
      }

      @media (max-width: 1024px) {
        #main-content.with-sidebar {
          width: 100%;
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 h-screen flex overflow-hidden font-sans">
    <!-- Schema Sidebar -->
    <!-- Schema Sidebar -->
    <aside
      id="schema-panel"
      class="bg-white shadow-lg border-r border-gray-200 overflow-hidden transition-all duration-300 w-64"
      style="min-width: 25rem"
    >
      <div class="schema-content h-full flex flex-col">
        <div class="p-4 border-b sticky top-0 bg-white z-10">
          <div class="flex justify-between items-center">
            <h2 class="text-xl font-bold text-gray-800">Database Schema</h2>
            <button
              id="toggle-schema"
              class="text-gray-500 hover:text-gray-800 focus:outline-none p-2 rounded-full hover:bg-gray-100"
            >
              <i class="fas fa-times"></i>
            </button>
          </div>

          <!-- Search Box -->
          <div class="mt-3 relative">
            <input
              type="text"
              id="schema-search"
              placeholder="Search tables and columns..."
              class="w-full px-3 py-2 pr-8 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            />
            <i class="fas fa-search text-gray-400 absolute right-3 top-2.5"></i>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto schema-scroll px-3 pt-2 pb-20">
          <!-- Tables will be dynamically inserted here -->
          <div class="mt-2 text-center text-gray-500 text-sm py-3">
            <i class="fas fa-spinner fa-spin mr-2"></i>
            Loading schema...
          </div>
        </div>

        <!-- Schema Legend -->
        <div class="border-t border-gray-200 p-3 bg-gray-50 text-xs">
          <div class="font-medium text-gray-700 mb-2">Legend:</div>
          <div class="grid grid-cols-2 gap-2">
            <div class="flex items-center">
              <i class="fas fa-key text-yellow-500 mr-1"></i>
              <span>Primary Key</span>
            </div>
            <div class="flex items-center">
              <i class="fas fa-link text-indigo-500 mr-1"></i>
              <span>Foreign Key</span>
            </div>
            <div class="flex items-center">
              <span class="w-2 h-2 bg-green-500 rounded-full mr-1"></span>
              <span>Text</span>
            </div>
            <div class="flex items-center">
              <span class="w-2 h-2 bg-blue-500 rounded-full mr-1"></span>
              <span>Number</span>
            </div>
            <div class="flex items-center">
              <span class="w-2 h-2 bg-purple-500 rounded-full mr-1"></span>
              <span>UUID</span>
            </div>
            <div class="flex items-center">
              <span class="w-2 h-2 bg-amber-500 rounded-full mr-1"></span>
              <span>Timestamp</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <div id="main-content" class="flex-grow flex flex-col with-sidebar">
      <!-- Header -->
      <header class="bg-white shadow-sm p-4 flex justify-between items-center">
        <div class="flex items-center">
          <button
            id="schema-button"
            class="mr-3 p-2 rounded-full text-gray-600 hover:bg-gray-100 lg:hidden"
          >
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="text-2xl font-bold text-gray-800">NL → SQL Chat</h1>
        </div>

        <div class="flex space-x-2">
          <button
            id="schema-button-desktop"
            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-sm hidden lg:flex items-center"
          >
            <i id="schema-icon" class="fas fa-database mr-2"></i>
            <span id="schema-text">Schema</span>
          </button>

          <a
            href="/select"
            class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 shadow-sm flex items-center"
          >
            <i class="fas fa-exchange-alt mr-2"></i>
            Change DB
          </a>
        </div>
      </header>

      <!-- Messages -->
      <main
        id="chat-container"
        class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-100"
      >
        <div id="welcome-message" class="flex justify-start mb-6">
          <div
            class="max-w-lg px-5 py-4 rounded-lg bg-white text-gray-800 shadow"
          >
            <p class="font-medium mb-1">Welcome to NL → SQL Chat</p>
            <p class="text-gray-600">
              Ask questions about your data in natural language, and I'll
              convert them to SQL.
            </p>
          </div>
        </div>

        <div id="response-container">
          <div id="sql-preview" class="font-mono text-sm text-gray-700"></div>
          <div
            id="error-message"
            class="text-red-600 font-semibold"
            style="display: none"
          ></div>
          <div
            id="result-message"
            class="text-green-700 font-semibold"
            style="display: none"
          ></div>
          <table
            id="result-table"
            class="display stripe hover w-full"
            style="display: none"
          >
            <thead>
              <tr id="table-headers"></tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </main>

      <!-- Confirmation Modal -->
      <div
        id="confirm-modal"
        class="fixed inset-0 hidden bg-black bg-opacity-50 flex items-center justify-center z-50"
      >
        <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-6">
          <h2 class="text-xl font-semibold mb-4">Confirm SQL Execution</h2>
          <pre
            id="modal-sql"
            class="bg-gray-100 rounded p-3 mb-4 overflow-auto text-sm"
          ></pre>
          <div class="flex justify-end space-x-2">
            <button
              id="modal-cancel"
              class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300"
            >
              Cancel
            </button>
            <button
              id="modal-confirm"
              class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
            >
              Execute
            </button>
          </div>
        </div>
      </div>

      <!-- Input -->
      <footer class="p-4 bg-white shadow-inner">
        <form id="query-form" class="flex space-x-2">
          <input
            type="text"
            name="nl_query"
            id="nl_query"
            placeholder="Type your question about the data..."
            class="flex-1 border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            required
          />
          <button
            type="submit"
            class="bg-green-500 text-white px-5 py-3 rounded-lg hover:bg-green-600 shadow-sm flex items-center justify-center"
          >
            <i class="fas fa-paper-plane mr-2"></i>
            Send
          </button>
        </form>
      </footer>
    </div>

    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script>
      $(function () {
        const initialSchema = {{ .Schema }};
        // console.log(initialSchema)
        renderSchema(initialSchema);
        var $schemaPanel = $("#schema-panel");
        var $schemaBtnMobile = $("#schema-button");
        var $schemaBtnDesktop = $("#schema-button-desktop");
        var $schemaIcon = $("#schema-icon");
        var $schemaText = $("#schema-text");
        var $mainContent = $("#main-content");
        var schemaVisible = true;

        function toggleSchema() {
          if ($(window).width() < 1024) {
            $schemaPanel
              .toggleClass("hidden")
              .toggleClass("fixed left-0 top-0 h-full z-50");
          } else {
            if (schemaVisible) {
              $schemaPanel.addClass("sidebar-collapsed");
              $schemaIcon.removeClass("fa-database").addClass("fa-bars");
              $schemaText.text("Show Schema");
              $mainContent.removeClass("with-sidebar");
            } else {
              $schemaPanel.removeClass("sidebar-collapsed");
              $schemaIcon.removeClass("fa-bars").addClass("fa-database");
              $schemaText.text("Schema");
              $mainContent.addClass("with-sidebar");
            }
            schemaVisible = !schemaVisible;
          }
        }

        $schemaBtnMobile.on("click", toggleSchema);
        $schemaBtnDesktop.on("click", toggleSchema);
        $("#toggle-schema").on("click", toggleSchema);

        $(document).on("click", ".table-header", function () {
          const $content = $(this).next(".table-content");
          const $icon = $(this).find(".rotate-icon");
          $content.slideToggle(150); // Optional animation
          $icon.toggleClass("down");
        });

        $(window)
          .on("resize", function () {
            if ($(window).width() >= 1024) {
              $schemaPanel.removeClass("hidden fixed left-0 top-0 h-full z-50");
              if (!schemaVisible) {
                $schemaPanel.addClass("sidebar-collapsed");
                $mainContent.removeClass("with-sidebar");
              } else {
                $schemaPanel.removeClass("sidebar-collapsed");
                $mainContent.addClass("with-sidebar");
              }
            } else {
              $schemaPanel.removeClass("sidebar-collapsed").addClass("hidden");
              $mainContent.removeClass("with-sidebar");
            }
          })
          .trigger("resize");
      });
    </script>
    <script src="/static/js/query.js"></script>
  </body>
</html>

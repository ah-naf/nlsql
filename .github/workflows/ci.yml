name: CI/CD Pipeline

on:
  push:
    branches: "**"
  pull_request:
    branches: "**"

jobs:
  backend:
    name: Backend Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: "backend/go.sum"

      - name: Install backend dependencies
        run: |
          cd backend
          go mod download

      - name: Run backend tests
        run: |
          cd backend
          go test ./...

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Check Linter
        run: |
          cd frontend
          npm run lint

  docker-publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [backend, frontend] # wait until both jobs finish
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env file for backend
        run: |
          cd backend
          cat <<EOF > .env
          LLM_API_KEY=${{ secrets.LLM_API_KEY }}
          LLM_API_URL=${{ secrets.LLM_API_URL }}
          LLM_API_MODEL_NAME=${{ secrets.LLM_API_MODEL_NAME }}
          EOF

      - name: Create .env file for frontend
        run: |
          cd frontend
          cat <<EOF > .env
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          EOF

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nlsql:v1 .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nlsql:v1
